<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Digital Library Assistant - Ultra</title>
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Βιβλιοθήκες για διάφορα αρχεία -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.2/dist/tesseract.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const dbName = "LibraryDB";
        const storeName = "files";

        const openDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 2);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(storeName)) {
                        db.createObjectStore(storeName, { keyPath: "path" });
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const saveFileToDB = async (fileData) => {
            try {
                const db = await openDB();
                const tx = db.transaction(storeName, "readwrite");
                tx.objectStore(storeName).put(fileData);
                return new Promise((resolve) => tx.oncomplete = resolve);
            } catch (e) {
                console.error("Database save error", e);
            }
        };

        const getAllFilesFromDB = async () => {
            try {
                const db = await openDB();
                const tx = db.transaction(storeName, "readonly");
                const store = tx.objectStore(storeName);
                const request = store.getAll();
                return new Promise((resolve) => request.onsuccess = () => resolve(request.result));
            } catch (e) {
                console.error("Database read error", e);
                return [];
            }
        };

        const clearDB = async () => {
            const db = await openDB();
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).clear();
            return new Promise((resolve) => tx.oncomplete = resolve);
        };

        const Icons = {
            Database: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>,
            FolderOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            File: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>,
            Image: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="red" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        };

        const App = () => {
            const [files, setFiles] = useState([]);
            const [isScanning, setIsScanning] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedFiles, setSelectedFiles] = useState([]);
            const [chatHistory, setChatHistory] = useState([]);
            const [userInput, setUserInput] = useState("");
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [errorMessage, setErrorMessage] = useState("");
            
            const chatEndRef = useRef(null);
            const folderInputRef = useRef(null);
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || "");

            useEffect(() => {
                const loadPersistentFiles = async () => {
                    const savedFiles = await getAllFilesFromDB();
                    if (savedFiles && savedFiles.length > 0) setFiles(savedFiles);
                };
                loadPersistentFiles();
            }, []);

            useEffect(() => {
                localStorage.setItem('gemini_api_key', apiKey);
            }, [apiKey]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [chatHistory]);

            const extractPdfText = async (file) => {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str).join(" ") + "\n";
                }
                return text;
            };

            const extractDocxText = async (file) => {
                const arrayBuffer = await file.arrayBuffer();
                const result = await mammoth.extractRawText({ arrayBuffer });
                return result.value;
            };

            const extractPptxText = async (file) => {
                const zip = await JSZip.loadAsync(file);
                let fullText = "";
                const slideFiles = Object.keys(zip.files).filter(name => name.startsWith("ppt/slides/slide") && name.endsWith(".xml"));
                for (const path of slideFiles) {
                    const content = await zip.file(path).async("text");
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(content, "text/xml");
                    const texts = Array.from(xmlDoc.getElementsByTagName("a:t")).map(t => t.textContent).join(" ");
                    fullText += `[Slide]: ${texts}\n`;
                }
                return fullText || "Δεν βρέθηκε κείμενο στο PPTX.";
            };

            const extractImageText = async (file) => {
                const { data: { text } } = await Tesseract.recognize(file, 'ell+eng');
                return text;
            };

            const processFiles = async (fileList) => {
                setIsScanning(true);
                const newFiles = [];
                for (const file of Array.from(fileList)) {
                    const name = file.name.toLowerCase();
                    let content = "";
                    let type = "text";

                    try {
                        if (name.endsWith('.pdf')) {
                            content = await extractPdfText(file);
                            type = "pdf";
                        } else if (name.endsWith('.docx')) {
                            content = await extractDocxText(file);
                            type = "doc";
                        } else if (name.endsWith('.pptx')) {
                            content = await extractPptxText(file);
                            type = "ppt";
                        } else if (/\.(png|jpg|jpeg)$/.test(name)) {
                            content = await extractImageText(file);
                            type = "image";
                        } else if (/\.(txt|md|json)$/.test(name)) {
                            content = await new Promise(r => {
                                const reader = new FileReader();
                                reader.onload = () => r(reader.result);
                                reader.readAsText(file);
                            });
                        } else {
                            continue;
                        }

                        const filePath = file.webkitRelativePath || file.name;
                        const fileData = { name: file.name, path: filePath, content, type };
                        newFiles.push(fileData);
                        await saveFileToDB(fileData);
                    } catch (err) {
                        console.error(`Error processing ${file.name}`, err);
                    }
                }
                setFiles(prev => [...prev, ...newFiles]);
                setIsScanning(false);
            };

            const handleSendMessage = async () => {
                if (!userInput.trim() || isAiLoading) return;
                
                if (!apiKey.trim()) {
                    setErrorMessage("Παρακαλώ εισάγετε το Gemini API Key πρώτα.");
                    return;
                }

                setErrorMessage("");
                const input = userInput;
                setChatHistory(prev => [...prev, { role: 'user', text: input }]);
                setUserInput("");
                setIsAiLoading(true);

                try {
                    const context = files
                        .filter(f => selectedFiles.length === 0 || selectedFiles.includes(f.path))
                        .map(f => `ΠΗΓΗ ${f.name}: ${f.content.substring(0, 3000)}`)
                        .join("\n\n");

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: input }] }],
                            systemInstruction: { parts: [{ text: `Είσαι ένας βοηθός βιβλιοθήκης. Απάντησε στα Ελληνικά βάσει αυτών των δεδομένων: ${context}` }] }
                        })
                    });

                    const data = await response.json();
                    
                    if (data.error) {
                        throw new Error(data.error.message || "Σφάλμα API");
                    }

                    if (data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
                        setChatHistory(prev => [...prev, { role: 'assistant', text: data.candidates[0].content.parts[0].text }]);
                    } else {
                        throw new Error("Μη αναμενόμενη δομή απόκρισης από το AI.");
                    }
                } catch (err) {
                    console.error("Chat Error:", err);
                    setChatHistory(prev => [...prev, { role: 'assistant', text: `Σφάλμα: ${err.message}. Ελέγξτε αν το κλειδί είναι σωστό και έχετε πρόσβαση στο διαδίκτυο.` }]);
                } finally {
                    setIsAiLoading(false);
                }
            };

            const filteredFiles = files.filter(f => f.name.toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className="flex h-screen bg-slate-50">
                    <input 
                        type="file" 
                        ref={folderInputRef} 
                        multiple 
                        webkitdirectory="true" 
                        directory="true" 
                        className="hidden" 
                        onChange={(e) => processFiles(e.target.files)} 
                    />
                    
                    <aside className="w-80 bg-white border-r flex flex-col shadow-sm">
                        <div className="p-4 border-b space-y-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-2 text-indigo-700 font-bold">
                                    <Icons.Database /> <span>Smart Library</span>
                                </div>
                                <button 
                                    onClick={() => folderInputRef.current.click()} 
                                    className="p-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition-colors"
                                    title="Επιλογή Φακέλου"
                                >
                                    <Icons.FolderOpen />
                                </button>
                            </div>
                            <div className="space-y-1">
                                <input 
                                    type="password" 
                                    placeholder="Gemini API Key" 
                                    className={`w-full px-3 py-2 bg-slate-50 border rounded-lg text-xs focus:ring-2 focus:ring-indigo-500 outline-none ${errorMessage ? 'border-red-500' : ''}`}
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                />
                                {errorMessage && <p className="text-[10px] text-red-500 px-1">{errorMessage}</p>}
                            </div>
                            <input 
                                type="text" 
                                placeholder="Αναζήτηση στα αρχεία..." 
                                className="w-full px-3 py-2 bg-slate-100 rounded-lg text-sm outline-none"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                        </div>

                        <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                            <p className="px-2 py-1 text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                                {files.length > 0 ? `Αρχεία (${files.length})` : 'Κενή Βιβλιοθήκη'}
                            </p>
                            {filteredFiles.map(file => (
                                <div 
                                    key={file.path} 
                                    onClick={() => setSelectedFiles(prev => prev.includes(file.path) ? prev.filter(p => p !== file.path) : [...prev, file.path])}
                                    className={`flex items-center gap-3 px-3 py-2 rounded-lg cursor-pointer text-xs transition-colors ${selectedFiles.includes(file.path) ? 'bg-indigo-600 text-white' : 'hover:bg-slate-100 text-slate-600'}`}
                                >
                                    <div className="flex-shrink-0">
                                        {file.type === 'image' ? <Icons.Image /> : <Icons.File />}
                                    </div>
                                    <span className="truncate flex-1" title={file.path}>{file.name}</span>
                                </div>
                            ))}
                        </div>
                        
                        {files.length > 0 && (
                            <button onClick={async () => { if(confirm("Σίγουρα θέλετε να διαγράψετε τη βιβλιοθήκη;")) { await clearDB(); setFiles([]); setSelectedFiles([]); } }} className="m-4 p-2 text-red-500 text-xs flex items-center justify-center gap-2 border border-red-100 rounded-lg hover:bg-red-50 transition-colors">
                                <Icons.Trash /> Καθαρισμός Βιβλιοθήκης
                            </button>
                        )}
                    </aside>

                    <main className="flex-1 flex flex-col">
                        <header className="h-16 bg-white border-b flex items-center px-6 justify-between shadow-sm">
                            <div>
                                <h2 className="font-bold text-slate-700 leading-tight">AI Assistant</h2>
                                <p className="text-[10px] text-slate-400">Επιλέξτε φάκελο για να ξεκινήσετε</p>
                            </div>
                            {isScanning && (
                                <div className="flex items-center gap-2 text-xs text-indigo-500">
                                    <div className="w-2 h-2 bg-indigo-500 rounded-full animate-ping"></div>
                                    <span className="animate-pulse">Ανάλυση περιεχομένου...</span>
                                </div>
                            )}
                        </header>

                        <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar bg-slate-50">
                            {chatHistory.length === 0 && (
                                <div className="h-full flex flex-col items-center justify-center text-slate-300 space-y-2">
                                    <Icons.Database />
                                    <p className="text-sm font-medium">Κάντε μια ερώτηση για τα έγγραφά σας</p>
                                </div>
                            )}
                            {chatHistory.map((msg, i) => (
                                <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] p-4 rounded-2xl text-sm shadow-sm ${msg.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white border text-slate-800 rounded-tl-none'}`}>
                                        {msg.text}
                                    </div>
                                </div>
                            ))}
                            {isAiLoading && (
                                <div className="flex justify-start">
                                    <div className="bg-white border rounded-2xl px-4 py-2 shadow-sm text-xs text-slate-400 animate-pulse">
                                        Ο βοηθός επεξεργάζεται την απάντηση...
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        <div className="p-4 bg-white border-t">
                            <div className="max-w-4xl mx-auto flex gap-2">
                                <input 
                                    type="text" 
                                    className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-inner"
                                    placeholder={files.length > 0 ? "Ρωτήστε οτιδήποτε για τα αρχεία σας..." : "Πρώτα επιλέξτε έναν φάκελο..."}
                                    value={userInput}
                                    disabled={files.length === 0}
                                    onChange={e => setUserInput(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleSendMessage()}
                                />
                                <button 
                                    onClick={handleSendMessage} 
                                    disabled={files.length === 0 || !userInput.trim() || isAiLoading}
                                    className="p-3 bg-indigo-600 text-white rounded-xl shadow-md hover:bg-indigo-700 disabled:bg-slate-300 disabled:shadow-none transition-all"
                                >
                                    <Icons.Send />
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
